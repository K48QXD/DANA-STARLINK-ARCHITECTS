<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanangMoi.vn - Điểm chuẩn vào lớp 10 (THPT)</title>
    <link rel="icon" type="image/png" href="favicon-16x16.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-indigo-50 text-gray-900">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-8 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tight">DanangMoi.vn</h1>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="#" class="hover:text-yellow-300 transition">Trang chủ</a></li>
                    <li><a href="#" class="font-bold border-b-2 border-yellow-400 pb-1">Điểm chuẩn Lớp 10</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hình ảnh tiêu đề -->
    <div class="container mx-auto mt-6 px-6">
        <img src="DANANGMOI.VN.jpg" alt="" class="w-full h-auto rounded-2xl shadow-lg border-4 border-white" onerror="this.style.display='none'">
    </div>

    <main class="container mx-auto p-6">
        <h2 class="text-4xl font-black mb-8 text-indigo-900 text-center">Tra cứu Điểm chuẩn Tuyển sinh Lớp 10 (2026-2027)</h2>

        <!-- Khung nhúng PDF -->
        <div class="bg-white p-6 rounded-2xl shadow-lg mb-10 border-t-4 border-indigo-500">
            <h3 class="text-xl font-bold mb-4 text-indigo-700">Tài liệu chi tiết đính kèm</h3>
            <iframe src="https://drive.google.com/file/d/1arHdbkXsxnDVJmBPBs-_WfeRHjHKwWqZ/preview" width="100%" height="600px" style="border:none;" allow="autoplay"></iframe>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-10">
            <!-- Biểu đồ Top 10 -->
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-yellow-500">
                <h3 class="text-xl font-bold mb-4 text-indigo-700">Top 10 Trường Điểm Cao Nhất</h3>
                <canvas id="top10Chart"></canvas>
            </div>
            <!-- Biểu đồ toàn bộ -->
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-500">
                <h3 class="text-xl font-bold mb-4 text-indigo-700">Phân Bổ Điểm 69 Trường THPT</h3>
                <canvas id="scoreChart"></canvas>
            </div>
        </div>
        
        <!-- Bảng dữ liệu -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-indigo-100">
            <table class="w-full text-left border-collapse" id="scoreTable">
                <thead>
                    <tr class="bg-indigo-600 text-white">
                        <th class="p-5">STT</th>
                        <th class="p-5">Tên trường THPT (Cấp 3)</th>
                        <th class="p-5">Điểm chuẩn</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-indigo-50">
                    <!-- Dữ liệu load qua JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const data = [
            { name: "THPT Phan Châu Trinh", score: 35.50 }, { name: "THPT Hòa Vang", score: 33.75 },
            { name: "THPT Hoàng Hoa Thám", score: 33.25 }, { name: "THCS, THPT Nguyễn Khuyến", score: 32.50 },
            { name: "THPT Trần Phú", score: 31.75 }, { name: "THPT Thái Phiên", score: 31.00 },
            { name: "THPT Trần Cao Vân", score: 29.50 }, { name: "THPT Nguyễn Văn Thoại", score: 29.25 },
            { name: "THPT Nguyễn Trãi", score: 29.00 }, { name: "THPT Sơn Trà", score: 27.00 },
            { name: "THPT Thanh Khê", score: 26.75 }, { name: "THPT Nguyễn Hiền", score: 26.50 },
            { name: "THPT Nguyễn Thượng Hiền", score: 26.00 }, { name: "THPT Trần Quý Cáp", score: 25.25 },
            { name: "THPT Cẩm Lệ", score: 25.00 }, { name: "THPT Ngô Quyền", score: 24.00 },
            { name: "THPT Ngũ Hành Sơn", score: 24.00 }, { name: "THPT Liên Chiểu", score: 23.00 },
            { name: "THPT Hồ Nghinh", score: 22.50 }, { name: "THPT Phạm Phú Thứ", score: 22.50 },
            { name: "THPT Phan Thành Tài", score: 22.50 }, { name: "THPT Lê Quý Đôn", score: 21.75 },
            { name: "THPT Võ Chí Công", score: 21.75 }, { name: "THPT Ông Ích Khiêm", score: 20.75 },
            { name: "THPT Tôn Thất Tùng", score: 20.75 }, { name: "THPT Nguyễn Trãi - Hội An", score: 20.25 },
            { name: "THPT Trần Hưng Đạo", score: 20.25 }, { name: "THPT Nguyễn Duy Hiệu", score: 20.00 },
            { name: "THPT Nguyễn Khuyến", score: 19.00 }, { name: "THPT Hoàng Diệu", score: 18.75 },
            { name: "THPT Lương Thế Vinh", score: 18.25 }, { name: "THPT Lương Thúc Kỳ", score: 17.50 },
            { name: "THPT Phạm Phú Thứ - Gò Nổi", score: 16.75 }, { name: "THPT Phan Bội Châu", score: 16.75 },
            { name: "THPT Núi Thành", score: 16.00 }, { name: "THPT Trần Văn Dư", score: 15.75 },
            { name: "THPT Hiệp Đức", score: 14.50 }, { name: "THPT Võ Nguyên Giáp", score: 14.00 },
            { name: "THPT Lê Hồng Phong", score: 13.50 }, { name: "THPT Nguyễn Huệ", score: 13.50 },
            { name: "THPT Hùng Vương", score: 12.75 }, { name: "THPT Huỳnh Ngọc Huệ", score: 12.75 },
            { name: "THPT Chu Văn An", score: 12.25 }, { name: "THPT Đỗ Đăng Tuyển", score: 11.75 },
            { name: "THPT Khâm Đức", score: 11.50 }, { name: "THPT Bắc Trà My", score: 11.00 },
            { name: "THPT Tố Hữu", score: 11.00 }, { name: "THPT Lý Tự Trọng", score: 10.75 },
            { name: "THPT Nguyễn Hiền - Duy Xuyên", score: 10.75 }, { name: "THPT Cao Bá Quát", score: 10.25 },
            { name: "THPT Nguyễn Thái Bình", score: 10.25 }, { name: "THPT Nông Sơn", score: 10.00 },
            { name: "THPT Võ Chí Công - Hùng Sơn", score: 9.75 }, { name: "THPT Trần Phú - Việt An", score: 9.50 },
            { name: "THPT Tây Giang", score: 9.25 }, { name: "THPT Thái Phiên - Thăng Bình", score: 9.25 },
            { name: "THPT Duy Tân", score: 9.00 }, { name: "THPT Nguyễn Văn Cừ", score: 9.00 },
            { name: "THPT Nguyễn Văn Trỗi", score: 9.00 }, { name: "THPT Sào Nam", score: 9.00 },
            { name: "THPT Huỳnh Thúc Kháng", score: 8.75 }, { name: "THPT Quế Sơn", score: 8.75 },
            { name: "THPT Phan Châu Trinh - Tiên Phước", score: 8.50 }, { name: "THPT Quang Trung - Đông Giang", score: 8.50 },
            { name: "THPT Trần Đại Nghĩa", score: 8.25 }, { name: "THPT Âu Cơ", score: 8.00 },
            { name: "THPT Tiểu La", score: 8.00 }, { name: "THPT Nam Trà My", score: 7.75 },
            { name: "THPT Nguyễn Dục", score: 7.50 }
        ];

        // Fill table
        const tbody = document.getElementById('tableBody');
        data.forEach((item, index) => {
            tbody.innerHTML += `<tr class="hover:bg-indigo-50 transition">
                <td class="p-4 font-semibold text-indigo-800">${index + 1}</td>
                <td class="p-4 font-medium text-gray-700">${item.name}</td>
                <td class="p-4 text-indigo-600 font-black text-lg">${item.score}</td>
            </tr>`;
        });

        // Top 10 Chart
        const top10 = data.slice(0, 10);
        new Chart(document.getElementById('top10Chart'), {
            type: 'bar',
            data: {
                labels: top10.map(d => d.name),
                datasets: [{ label: 'Điểm', data: top10.map(d => d.score), backgroundColor: '#f59e0b' }]
            }
        });

        // All Chart
        new Chart(document.getElementById('scoreChart'), {
            type: 'line',
            data: {
                labels: data.map(d => d.name),
                datasets: [{ label: 'Điểm chuẩn', data: data.map(d => d.score), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true }]
            }
        });
    </script>
</body>
</html>
